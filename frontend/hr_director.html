<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HR-Директор | Digital Doc Portal</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">
    <div id="app" class="p-8 max-w-5xl mx-auto">
        
        <div class="flex justify-between items-center mb-10">
            <div>
                <span class="bg-purple-100 text-purple-800 text-xs font-bold px-3 py-1 rounded-full uppercase">Режим: HR-Директор</span>
                <h1 class="text-3xl font-bold text-slate-900 mt-3">Утверждение пакетов (BPM)</h1>
            </div>
            <button @click="fetchInbox" class="bg-white border border-slate-300 hover:bg-slate-50 px-4 py-2 rounded-xl font-medium">
                Обновить
            </button>
        </div>

        <div v-if="campaigns.length === 0" class="bg-white p-12 rounded-2xl shadow-sm border border-slate-100 text-center">
            <h3 class="text-lg font-medium">Всё подписано!</h3>
        </div>

        <div v-else class="grid grid-cols-1 gap-4">
            <div v-for="camp in campaigns" :key="camp.id" class="bg-white p-6 rounded-2xl shadow-sm border border-l-4 border-l-purple-500 flex items-center justify-between">
                <div>
                    <span class="bg-slate-100 text-slate-600 text-xs font-bold px-2 py-1 rounded">Кампания #{{ camp.id }}</span>
                    <h3 class="text-xl font-bold mt-2">Документов в пакете: {{ camp.docsCount }}</h3>
                    <p class="text-sm text-slate-500 mt-1">Ожидают вашей подписи на Шаге 1</p>
                </div>
                <button @click="signCampaign(camp.id)" class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-3 rounded-xl font-medium shadow-sm">
                    Подписать пакет
                </button>
            </div>
        </div>

    </div>

    <script>
        const { createApp, ref, onMounted } = Vue
        createApp({
            setup() {
                const campaigns = ref([]);

                const fetchInbox = async () => {
                    try {
                        // 1. Получаем все документы на шаге hr_director
                        const res = await fetch('http://localhost:8000/api/bpm/inbox?role=hr_director');
                        const docs = await res.json();
                        
                        // 2. Группируем их по кампаниям для удобства директора
                        const map = new Map();
                        docs.forEach(doc => {
                            if(!map.has(doc.campaign_id)) map.set(doc.campaign_id, { id: doc.campaign_id, docsCount: 0 });
                            map.get(doc.campaign_id).docsCount++;
                        });
                        campaigns.value = Array.from(map.values());
                    } catch (e) {
                        Swal.fire('Ошибка', 'Сбой связи', 'error');
                    }
                }

                const signCampaign = async (campaignId) => {
                    const { value: pin } = await Swal.fire({
                        title: 'Утвердить пакет?', text: "Введите ПИН-код MSign", input: 'password', showCancelButton: true, confirmButtonColor: '#9333ea'
                    });

                    if (pin && pin.length === 4) {
                        try {
                            // 1. Подписываем пачку (двигаем на Шаг 2)
                            await fetch(`http://localhost:8000/api/admin/campaigns/${campaignId}/sign-by-hr`, { method: 'POST' });
                            // 2. Рассылаем письма сотрудникам
                            await fetch(`http://localhost:8000/api/admin/campaigns/${campaignId}/send-notifications`, { method: 'POST' });
                            
                            Swal.fire('Успешно', 'Пакет подписан и передан сотрудникам.', 'success');
                            fetchInbox();
                        } catch (e) {
                            Swal.fire('Ошибка', 'Сбой системы', 'error');
                        }
                    }
                }

                onMounted(() => fetchInbox());
                return { campaigns, fetchInbox, signCampaign }
            }
        }).mount('#app')
    </script>
</body>
</html>
