<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Кабинет Сотрудника | Digital Doc Portal</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">
    <div id="app" class="p-8 max-w-5xl mx-auto">
        
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-slate-900">Мои документы</h1>
                <p class="text-slate-500 text-sm mt-1">Здесь появляются документы, требующие вашего ознакомления.</p>
            </div>
            <div class="flex items-center gap-4">
                <input v-model="currentUserId" type="text" placeholder="Ваш ID (напр. emp_001)" class="px-4 py-2 border rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                <button @click="fetchMyInbox" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-xl font-medium shadow-sm transition-all">Войти</button>
            </div>
        </div>

        <div v-if="!hasSearched" class="text-center py-12 text-slate-400">
            Введите ваш ID (например, emp_001) и нажмите Войти
        </div>

        <div v-else-if="myDocs.length === 0" class="bg-white p-12 rounded-2xl shadow-sm border border-slate-100 text-center">
            <h3 class="text-lg font-medium text-slate-900">Всё подписано!</h3>
            <p class="text-slate-500 mt-1">У вас нет новых документов на подпись.</p>
        </div>

        <div v-else class="grid grid-cols-1 gap-4">
            <div v-for="doc in myDocs" :key="doc.doc_id" class="bg-white p-6 rounded-2xl shadow-sm border border-l-4 border-l-green-500 flex items-center justify-between gap-6 hover:shadow-md transition-shadow">
                <div class="flex-1">
                    <span class="bg-blue-50 text-blue-700 text-xs font-semibold px-2 py-1 rounded">Документ #{{ doc.doc_id }}</span>
                    <h3 class="text-lg font-bold text-slate-900 mt-2">Документ от отдела кадров</h3>
                    <p class="text-sm text-slate-500 mt-1">Поступил: {{ doc.created_at }}</p>
                </div>

                <div class="flex gap-3">
                    <button @click="viewDocument(doc.doc_id)" class="text-blue-600 bg-blue-50 hover:bg-blue-100 px-4 py-2 rounded-xl font-medium transition-colors">Читать</button>
                    <button @click="signDocument(doc.doc_id)" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-xl font-medium shadow-sm transition-all flex items-center gap-2">
                        Подписать MSign
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script>
        const { createApp, ref } = Vue
        createApp({
            setup() {
                const currentUserId = ref('emp_001');
                const myDocs = ref([]);
                const hasSearched = ref(false);

                const fetchMyInbox = async () => {
                    if(!currentUserId.value) return;
                    hasSearched.value = true;
                    try {
                        // ИСПОЛЬЗУЕМ НОВЫЙ ИНБОКС ДЛЯ СОТРУДНИКА
                        const res = await fetch(`http://localhost:8000/api/bpm/inbox?role=employee&user_id=${currentUserId.value}`);
                        if (!res.ok) throw new Error('Сбой API');
                        myDocs.value = await res.json();
                    } catch (e) {
                        Swal.fire('Ошибка', 'Не удалось загрузить документы', 'error');
                    }
                }

                const viewDocument = (docId) => {
                    window.open(`http://localhost:8000/api/documents/${currentUserId.value}/${docId}/pdf`, '_blank');
                }

                const signDocument = async (docId) => {
                    const { value: pin } = await Swal.fire({
                        title: 'Подписание ПЭП', text: "Введите 4 цифры ПИН-кода", input: 'password',
                        showCancelButton: true, confirmButtonText: 'Подписать', confirmButtonColor: '#16a34a'
                    });

                    if (pin && pin.length === 4) {
                        try {
                            // УНИВЕРСАЛЬНАЯ ПОДПИСЬ
                            const res = await fetch(`http://localhost:8000/api/bpm/documents/${docId}/sign`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ user_id: currentUserId.value, role: 'employee' })
                            });

                            if (res.ok) {
                                Swal.fire('Успешно!', 'Документ имеет юридическую силу.', 'success');
                                fetchMyInbox(); // Обновляем инбокс
                            } else throw new Error('Ошибка подписания');
                        } catch (error) {
                            Swal.fire('Ошибка', error.message, 'error');
                        }
                    }
                }

                return { currentUserId, myDocs, hasSearched, fetchMyInbox, viewDocument, signDocument }
            }
        }).mount('#app')
    </script>
</body>
</html>
